name: Ingest

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

jobs:
  ingest:
    if: ${{ github.event_name == 'workflow_dispatch' || vars.APP_URL != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Trigger ingestion
        env:
          APP_URL: ${{ vars.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          test -n "$APP_URL" || { echo "APP_URL repository variable is not configured" >&2; exit 1; }
          test -n "$CRON_SECRET" || { echo "CRON_SECRET Actions secret is not configured" >&2; exit 1; }
          curl --fail --silent --show-error --request POST \
            --header "x-cron-secret: $CRON_SECRET" \
            "${APP_URL%/}/api/ingest"
